<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | Rift Fighters</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #1a3bcc; --bg: #f0f2f8; --text-dark: #0d1340; --radius: 14px; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-dark); min-height: 100vh; }
    .wix-banner { text-align: center; padding: 10px; font-size: 13px; color: var(--blue); border-bottom: 1px solid #dde2f0; background: white; }
    .wix-banner a { color: var(--blue); text-decoration: none; font-weight: 500; }
    nav { display: flex; justify-content: flex-end; padding: 18px 40px; background: var(--bg); }
    .nav-btn { border: 2px solid var(--blue); color: var(--blue); background: transparent; padding: 10px 28px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; }
    .nav-btn:hover { background: var(--blue); color: white; }
    .hero { padding: 80px 60px 20px; animation: fadeUp 0.7s ease both; max-width: 900px; }
    .hero h1 { font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; color: var(--text-dark); }
    .hero-desc { font-size: 1.1rem; line-height: 1.7; color: #2a2a3a; max-width: 580px; margin-top: 24px; }
    .hero-desc span { color: var(--blue); font-weight: 500; }
    .cta-grid { display: flex; flex-wrap: wrap; gap: 18px; padding: 40px 60px 80px; animation: fadeUp 0.9s ease both; }
    .cta-btn { border: 2px solid var(--blue); color: var(--blue); background: transparent; padding: 22px 32px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; flex: 1 1 180px; max-width: 280px; min-height: 80px; transition: background 0.2s, color 0.2s, transform 0.15s; line-height: 1.3; display: flex; align-items: center; justify-content: center; text-align: center; text-decoration: none; }
    .cta-btn:hover { background: var(--blue); color: white; transform: translateY(-2px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  
  <nav><a href="./index.html" class="nav-btn">HOME</a></nav>
  
  <section class="hero">
    <h1>Welcome To<br>Rift Fighters!</h1>

  </section>

  <div class="cta-grid">
    <a class="cta-btn" href="./project-details.html">Learn More</a>
    <a class="cta-btn" href="./team.html">The Team</a>

    <a class="cta-btn" href="./resources.html">Resources</a>
    <a class="cta-btn" href="./RapportSoutenanceFinale.pdf" download="">Defense<br>Report</a>
  </div>

</body>
</html>
