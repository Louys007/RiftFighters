<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team | Rift Fighters</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #1a3bcc; --bg: #f0f2f8; --text-dark: #0d1340; --radius: 14px; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text-dark); min-height: 100vh; }
    .wix-banner { text-align: center; padding: 10px; font-size: 13px; color: var(--blue); border-bottom: 1px solid #dde2f0; background: white; }
    .wix-banner a { color: var(--blue); text-decoration: none; font-weight: 500; }
    nav { display: flex; justify-content: flex-end; padding: 18px 40px; background: var(--bg); }
    .nav-btn { border: 2px solid var(--blue); color: var(--blue); background: transparent; padding: 10px 28px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; text-decoration: none; transition: background 0.2s, color 0.2s; }
    .nav-btn:hover { background: var(--blue); color: white; }
    .content { max-width: 780px; margin: 0 auto; padding: 60px 40px 80px; animation: fadeUp 0.7s ease both; }
    .header-row { display: flex; align-items: flex-start; gap: 48px; margin-bottom: 52px; }
    .header-row h1 { font-size: 2.8rem; font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; color: var(--text-dark); flex-shrink: 0; }
    .header-desc { font-size: 0.9rem; line-height: 1.7; color: #2a2a3a; max-width: 340px; padding-top: 6px; }
    .header-desc span { color: var(--blue); }
    .team-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .member-card { background: #e6e9f4; border-radius: 10px; padding: 20px 22px; min-width: 160px; flex: 1; }
    .member-card .name { font-size: 1rem; font-weight: 400; color: var(--text-dark); margin-bottom: 8px; line-height: 1.3; }
    .member-card .role { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); font-weight: 500; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <nav><a href="index.html" class="nav-btn">HOME</a></nav>
  <div class="content">
    <div class="header-row">
      <h1>Meet the<br>Team</h1>
      <p class="header-desc">Each member of the <span>Rift Fighters</span> team brings a unique set of skills and passion to this project. Together, we've combined code, art, and sound to create an unforgettable 2D experience.</p>
    </div>
    <div class="team-grid">
      <div class="member-card">
        <div class="name">Senouci<br>Adam</div>
        <div class="role">Programmer</div>
      </div>
      <div class="member-card">
        <div class="name">Schweykart<br>Louis</div>
        <div class="role">Programmer</div>
      </div>
      <div class="member-card">
        <div class="name">Dincov<br>Ioan</div>
        <div class="role">Designer</div>
      </div>
    </div>
  </div>
</body>
</html>
